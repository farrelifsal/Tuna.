  <!-- MAIN CONTENT -->
  <main class="container py-5 flex-grow-1">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <div class="text-center mb-4">
          <h2 class="fw-bold">Search Product</h2>
          <p class="text-muted mb-0">Tulis nama produk atau kategori.</p>
        </div>

        <form onsubmit="return handleSearch(event)">
          <div class="input-group input-group-lg">
            <span class="input-group-text bg-white">
              <i class="bi bi-search"></i>
            </span>
            <input type="text" id="searchInput" class="form-control" placeholder="Example: shoes, shirt, watch">
            <button class="btn btn-dark" type="submit">Search</button>
          </div>
        </form>

        <div id="resultInfo" class="text-center mt-4 fw-semibold"></div>

      </div>
    </div>
  </main>

  <!-- CTA -->
  <div class="container-fluid text-center text-light fw-bold mt-4" style="background-color: rgb(81, 81, 81);">
    Grab Yours Now.
  </div>

  <!-- FOOTER -->
  <footer class="container-fluid bg-white py-4 border-top border-dark px-4 px-md-5 mt-auto">
    <div class="row text-center align-items-center">

      <div class="col-md-3 mb-4">
        <img src="foto/logo.jpg" width="65">
      </div>

      <div class="col-md-3 mb-4">

      </div>

        </a>
      </div>

      <div class="col-md-3 mb-4">
        <h6 class="fw-bold">SOCIAL MEDIA</h6>
        <div class="d-flex justify-content-center gap-3">
          <a href="#" class="text-dark"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-dark"><i class="bi bi-tiktok"></i></a>
          <a href="#" class="text-dark"><i class="bi bi-youtube"></i></a>
        </div>
      </div>

    </div>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function handleSearch(event) {
      event.preventDefault();

      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      const resultInfo = document.getElementById('resultInfo');

      const routes = [
        { page: 'shoes.html', keywords: ['tuna', 'shoe', 'shoes', 'sepatu', 'sneakers', 'signature', 'speedfish', 'speedy'] },
        { page: 'shirt.html', keywords: ['tuna', 'shirt', 'baju', 'kaos', 'signature', ] },
        { page: 'accesories.html', keywords: ['tuna', 'accesories', 'aksesoris', 'fishy', 'shade', 'watch', 'slippy', 'bag'] }
      ];

      if (!keyword) {
        resultInfo.innerHTML = '<span class="text-danger">Tolong isi kata kunci dulu.</span>';
        return false;
      }

      for (const item of routes) {
        if (item.keywords.some(word => keyword.includes(word))) {
          resultInfo.innerHTML = `<span class="text-success">Redirecting...</span>`;
          setTimeout(() => {
            window.location.href = item.page;
          }, 600);
          return false;
        }
      }

      resultInfo.innerHTML = '<span class="text-danger">Produk tidak ditemukan.</span>';
      return false;
    }
  </script>

</body>
